# Medallion Lakehouse Architecture
# Bronze → Silver → Gold ETL pipeline with scheduling
#
# Deploy:
#   fab-bundle deploy -t dev
#   fab-bundle deploy -t prod

bundle:
  name: medallion-analytics
  version: "1.0.0"
  description: "Bronze/Silver/Gold lakehouse architecture with scheduled ETL"

resources:
  environments:
    spark_env:
      runtime: "1.3"
      libraries:
        - semantic-link-labs
        - delta-spark

  lakehouses:
    bronze:
      description: "Raw data landing zone — append-only ingestion"
      enable_schemas: true
    silver:
      description: "Cleaned and conformed data — validated, deduplicated"
      enable_schemas: true
    gold:
      description: "Business-ready aggregates for reporting and analytics"
      enable_schemas: true

  notebooks:
    ingest_to_bronze:
      path: ./notebooks/ingest_to_bronze.py
      description: "Ingest raw data from source systems into bronze"
      environment: spark_env
      default_lakehouse: bronze
      parameters:
        source_path: "/mnt/raw"
        batch_date: "2024-01-01"

    bronze_to_silver:
      path: ./notebooks/bronze_to_silver.py
      description: "Clean, validate, and deduplicate bronze data"
      environment: spark_env
      default_lakehouse: silver

    silver_to_gold:
      path: ./notebooks/silver_to_gold.py
      description: "Aggregate and curate silver data into gold datasets"
      environment: spark_env
      default_lakehouse: gold

  pipelines:
    daily_etl:
      description: "End-to-end daily refresh: bronze → silver → gold"
      schedule:
        cron: "0 6 * * *"
        timezone: America/Chicago
        enabled: true
      activities:
        - name: ingest
          notebook: ingest_to_bronze
        - name: clean
          notebook: bronze_to_silver
          depends_on: [ingest]
        - name: aggregate
          notebook: silver_to_gold
          depends_on: [clean]

  warehouses:
    analytics_warehouse:
      description: "SQL views over gold lakehouse tables"
      sql_scripts:
        - ./sql/create_views.sql

  semantic_models:
    analytics_model:
      path: ./semantic_model/
      description: "Power BI semantic model over gold data"
      default_lakehouse: gold
      auto_refresh: true

  data_agents:
    analytics_agent:
      description: "Natural language interface to your data"
      sources:
        - gold
        - analytics_warehouse
      instructions: ./agent/instructions.md

security:
  roles:
    - name: data_engineers
      entra_group: sg-data-engineering
      workspace_role: contributor
    - name: analysts
      entra_group: sg-analysts
      workspace_role: viewer
      onelake_roles:
        - tables: ["*"]
          permissions: [read]

targets:
  dev:
    default: true
    workspace:
      name: medallion-dev
      capacity_id: "${var.capacity_id}"
    variables:
      source_path: "/mnt/dev/raw"

  staging:
    workspace:
      name: medallion-staging
      capacity_id: "${var.capacity_id}"

  prod:
    workspace:
      name: medallion-prod
      capacity_id: "${var.capacity_id}"
    run_as:
      service_principal: sp-fabric-prod
    deployment_strategy:
      type: canary
      canary_resources: [ingest_to_bronze]

variables:
  capacity_id:
    description: "Fabric capacity GUID"
    default: "REPLACE-WITH-YOUR-CAPACITY-GUID"
  source_path:
    description: "Path to raw source data"
    default: "/mnt/raw"
