name: osdu-analytics
description: "OSDU on Azure Fabric — well/wellbore/production analytics for Oil, Gas & Energy"
version: "1.0.0"
author: "Fabric Automation Bundles — OGE Segment"
variables:
  project_name:
    description: "Name of the project"
    default: "osdu-fabric-analytics"
  adme_endpoint:
    description: "Azure Data Manager for Energy endpoint"
    default: "https://myorg.energy.azure.com"
  capacity_id:
    description: "Fabric capacity GUID (from Admin Portal → Capacities)"
    default: ""
  adls_account:
    description: "ADLS Gen2 storage account for OSDU raw data"
    default: "myorgadme"
